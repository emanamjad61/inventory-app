services:
  app:
    build:
      context: .
    image: inventory-app:${APP_IMAGE_TAG:-local}
    ports:
      - "${APP_PORT:-5000}:5000"
    networks:
      default:
        aliases:
          - inventory-web
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
